[package]
name = "sfu"
version = "0.20.0-rc.1"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Rusty Rain <y@liu.mx>"]
repository = "https://github.com/webrtc-rs/sfu"
homepage = "https://sfu.rs"
description = "SFU in Rust with Sans-IO"
keywords = ["networking", "protocols", "webrtc", "sans-io", "sfu"]
categories = ["network-programming", "asynchronous", "multimedia"]

[dependencies]
apprtc = { version = "0.20.0-rc.1", path = "apprtc" }
rtc = { version = "0.20.0-rc.1", path = "rtc/rtc" }
sansio = "1"
bytes = "1.12.0"

[dev-dependencies]
hyper = { version = "0.14.32", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.52.3", features = ["full"] }

[[example]]
name = "sfu"
path = "examples/sfu.rs"

[[example]]
name = "sfu-probe"
path = "examples/sfu-probe.rs"
