[package]
name = "sfu"
version = "0.20.0-rc.1"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Rusty Rain <y@liu.mx>"]
repository = "https://github.com/webrtc-rs/sfu"
homepage = "https://sfu.rs"
description = "SFU in Rust with Sans-IO"
keywords = ["networking", "protocols", "webrtc", "sans-io", "sfu"]
categories = ["network-programming", "asynchronous", "multimedia"]

[[bin]]
name = "sfu"
path = "bin/sfu.rs"

[dependencies]
apprtc = { version = "0.20.0-rc.1", path = "apprtc" }
rtc = { version = "0.20.0-rc.1", path = "rtc/rtc" }
sansio = "1"
bytes = "1.12.0"
