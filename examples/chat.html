<!DOCTYPE html>
<html>

<head>
    <title>WebRTC Chat example</title>
    <style>
        body {
            background: black;
            color: white;
        }
    </style>
</head>

<body>
<label for="room">Room: </label>
<input type="number" id="room"></input>
<button id="join" onClick="startRtc()">Join</button>
<button id="leave" onClick="leaveRtc()" disabled>Leave</button>
<button id="cam" onClick="startCam()" disabled>Cam</button>
<button id="mic" onClick="startMic()" disabled>Mic</button>
Status: <span id="ice_status">Waiting</span>
<div id="chan_status">Click Join Button...</div>
<div id="media"></div>
<script>
    const byId = (id) => document.getElementById(id);
    const byTag = (tag) => [].slice.call(document.getElementsByTagName(tag));

    byId("room").value = Math.floor(Math.random() * 1000000000);
    let clientId = Math.floor(Math.random() * 1000000000);
    let streamCam;
    let streamMic;
    let dataChannel;
    let ws;
    let rtc = new RTCPeerConnection();

    // Single bi-directional signaling channel (borrowed from AppRTC/Collider): the browser
    // registers {room, client} once, then exchanges SDP as {cmd, sdp} frames; the SFU
    // pushes answers and server-initiated re-offers back on the same socket.
    function sendSignal(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(obj));
        } else {
            console.log('WS not open; dropping', obj.cmd);
        }
    }
    rtc.oniceconnectionstatechange = () => {
        byId('ice_status').innerText = rtc.iceConnectionState;
        if (rtc.iceConnectionState == 'disconnected' || rtc.iceConnectionState == 'failed') {
            if (streamCam) {
                streamCam.getTracks()[0]?.stop();
            }
            if (streamMic) {
                streamMic.getTracks()[0]?.stop();
            }
            rtc.close();
            byId('join').disabled = true;
            byId('leave').disabled = true;
            byId('cam').disabled = true;
            byId('mic').disabled = true;
        }
    };

    async function negotiate() {
        const offer = await rtc.createOffer();
        console.log('do offer', offer.sdp.split('\r\n'));
        rtc.setLocalDescription(offer);

        // Send the offer over the WebSocket; the SFU's answer arrives asynchronously on
        // the same socket (see onWsMessage).
        sendSignal({ cmd: 'offer', sdp: offer });
    }

    async function handleAnswer(answer) {
        console.log('received answer', answer.sdp.split('\r\n'));
        try {
            rtc.setRemoteDescription(answer);
        } catch (error) {
            console.log('rtc.setRemoteDescription(answer) with error: ', error);
        }
    }

    async function handleOffer(offer) {
        console.log('handle offer', offer.sdp.split('\r\n'));
        try {
            rtc.setRemoteDescription(offer);
        } catch (error) {
            console.log('rtc.setRemoteDescription(offer) with error: ', error);
        }
        const answer = await rtc.createAnswer();
        console.log('offer response', answer.sdp.split('\r\n'));
        rtc.setLocalDescription(answer);

        // Answer the SFU's server-initiated re-offer over the same WebSocket.
        sendSignal({ cmd: 'answer', sdp: answer });
    }

    // Server->browser: the SFU pushes bare SDP JSON ({type, sdp}). An 'answer' completes
    // our offer; an 'offer' is a subscribe re-offer we must answer.
    function onWsMessage(event) {
        const sdp = JSON.parse(event.data);
        if (sdp.type === 'answer') {
            handleAnswer(sdp);
        } else if (sdp.type === 'offer') {
            handleOffer(sdp);
        } else {
            console.log('unexpected WS message', event.data);
        }
    }

    async function startCam() {
        byId('cam').disabled = true;
        streamCam = await navigator.mediaDevices.getUserMedia({
            video: {
                width: 640,
                height: 360,
            },
        });
        const tr = rtc.addTransceiver(streamCam.getTracks()[0], {
            direction: "sendonly",
            streams: [streamCam],
            // This table shows the valid values for simulcast.
            //
            // https://chromium.googlesource.com/external/webrtc/+/branch-heads/49/talk/media/webrtc/simulcast.cc
            // These tables describe from which resolution we can use how many
            // simulcast layers at what bitrates (maximum, target, and minimum).
            // Important!! Keep this table from high resolution to low resolution.
            // const SimulcastFormat kSimulcastFormats[] = {
            //   {1920, 1080, 3, 5000, 4000, 800},
            //   {1280, 720, 3,  2500, 2500, 600},
            //   {960, 540, 3, 900, 900, 450},
            //   {640, 360, 2, 700, 500, 150},
            //   {480, 270, 2, 450, 350, 150},
            //   {320, 180, 1, 200, 150, 30},
            //   {0, 0, 1, 200, 150, 30}
            // };

            // Uncomment this to enable simulcast. The actual selected
            // simulcast level is hardcoded in sync_chat.
            // sendEncodings: [
            //     { rid: "h", maxBitrate: 700 * 1024 },
            //     { rid: "l", maxBitrate: 150 * 1024 }
            // ]
        });
        await negotiate();
    }

    async function startMic() {
        byId('mic').disabled = true;
        streamMic = await navigator.mediaDevices.getUserMedia({
            audio: true,
        });
        const tr = rtc.addTransceiver(streamMic.getTracks()[0], {
            streams: [streamMic],
            direction: "sendonly"
        });
        await negotiate();
    }

    rtc.ontrack = (e) => {
        console.log('ontrack', e.track);
        const track = e.track;
        const domId = `media-${track.id}`;
        if (byId(domId)) {
            // we aleady have this track
            return;
        }
        const el = document.createElement('video');
        el.id = domId;
        el.width = 500;
        byId('media').appendChild(el);
        el.controls = true;
        el.autoplay = true;
        el.playsInline = true;
        el.hidden = track.muted;
        const media = new MediaStream();
        media.addTrack(track);
        el.srcObject = media;
        const playVideo = () => {
            el.play().catch((error) => {
                console.log('video.play() failed', error);
            });
        };
        el.addEventListener('loadedmetadata', playVideo);
        playVideo();
        track.addEventListener('mute', () => {
            console.log('track muted', track);
            el.hidden = true;
        });
        track.addEventListener('unmute', () => {
            console.log('track unmuted', track);
            el.hidden = false;
            playVideo();
        });
    };

    async function startRtc() {
        byId('ice_status').innerText = 'Connecting';
        byId('chan_status').innerText = 'Joining room ' + byId("room").value + ' as client ' + clientId;
        byId("room").disabled = true;
        byId('join').disabled = true;
        byId('leave').disabled = false;

        // The data channel is a transport bootstrap: the initial offer needs at least one
        // m-line to establish DTLS/ICE, and its onopen tells us the connection is ready.
        dataChannel = rtc.createDataChannel("bootstrap");
        dataChannel.onopen = () => {
            byId('chan_status').innerText = 'Joined room ' + byId("room").value + ' as client ' + clientId;
            byId('mic').disabled = false;
            byId('cam').disabled = false;
        };

        // One WebSocket carries all signaling, both directions. On open we register, then
        // send our initial offer; the SFU's answer and any re-offers arrive on onmessage.
        ws = new WebSocket('wss://' + location.host + '/ws');
        ws.onopen = async () => {
            console.log('WS open; registering ' + byId("room").value + '/' + clientId);
            sendSignal({ cmd: 'register', roomid: Number(byId("room").value), clientid: clientId });

            const offer = await rtc.createOffer();
            rtc.setLocalDescription(offer);
            console.log('send offer', offer.sdp.split('\r\n'));
            sendSignal({ cmd: 'offer', sdp: offer });
        };
        ws.onmessage = onWsMessage;
        ws.onclose = (e) => console.log('WS closed:', e.code, e.reason);
        ws.onerror = (e) => console.log('WS error:', e);
    }

    async function leaveRtc() {
        byId('ice_status').innerText = 'Waiting';
        byId('chan_status').innerText = 'Click Join Button...'
        byId("room").disabled = false;
        byId('join').disabled = false;
        byId('leave').disabled = true;

        sendSignal({ cmd: 'leave' });
        rtc.close();
        if (ws) {
            ws.close();
            ws = null;
        }

        rtc = new RTCPeerConnection();
    }
</script>
</body>

</html>
